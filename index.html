<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#030510" />
  <meta name="description" content="GALAXYAN — HTML5 Canvas 네온 슈팅 게임" />
  <title>GALAXYAN — 네온 슈팅</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="sky-backdrop" aria-hidden="true">
    <div class="sky-nebula"></div>
    <div class="sky-stars sky-stars--fine"></div>
    <div class="sky-stars sky-stars--bright"></div>
    <div class="sky-moon-wrap">
      <div class="sky-moon-glow"></div>
      <div class="sky-moon">
        <span class="sky-moon-crater sky-moon-crater--1"></span>
        <span class="sky-moon-crater sky-moon-crater--2"></span>
        <span class="sky-moon-crater sky-moon-crater--3"></span>
      </div>
    </div>
  </div>
  <header class="game-header" aria-label="게임 타이틀">
    <p class="game-eyebrow">ARCADE · SHOOT &apos;EM UP</p>
    <h1 class="game-title"><span class="game-title-inner">GALAXYAN</span></h1>
    <p class="game-tagline">Neon Squadron · HTML5 Canvas</p>
    <p class="game-tagline-ko">겔럭시안 스타일 아케이드 슈팅</p>
  </header>
  <div class="game-outer">
    <div id="wrap">
      <canvas id="game" width="480" height="640" aria-label="게임 화면"></canvas>
      <div id="start-overlay" class="screen-overlay">
      <div class="overlay-card">
        <p class="start-eyebrow">GALAXYAN</p>
        <p class="start-heading">준비 완료</p>
        <p class="start-desc">네온이 깜빡이는 심연 속으로.<br />당신의 포화가 새로운 별자리를 만든다.</p>
        <p class="start-touch-hint" aria-hidden="true">
          기체는 캔버스를 누른 채로 손가락을 옮기며 조종합니다. 자동 발사 · 캔버스 아래 오른쪽 폭탄.
        </p>
        <button type="button" id="btn-start">게임 시작</button>
      </div>
    </div>
    <div id="hud">
      <div id="score-line">점수: <span id="score">0</span></div>
      <div class="hud-level-hp" aria-label="레벨 및 체력">
        <div id="level-line">레벨: <span id="level">1</span></div>
        <div id="hp-line" class="hud-hp">
          <span class="hud-hp-label">체력</span>
          <div
            class="hud-hp-track"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="100"
            aria-label="플레이어 체력"
          >
            <div id="hp-fill" class="hud-hp-fill"></div>
          </div>
        </div>
      </div>
      <div id="lives-line">생명: <span id="lives">3</span></div>
      <div id="bomb-line">
        폭탄: <span id="bombs">0</span>/5<span class="bomb-key-hint"> · <span class="bomb-hint">B</span></span>
      </div>
    </div>
    <div id="hud-loadout" class="hud-loadout hud-idle" aria-label="탄속, 탄 강도, 무기">
      <div class="hud-loadout__row">
        <span class="hud-loadout__k">탄속</span>
        <span id="hud-bullet-pwr" class="hud-loadout__v">1/14</span>
      </div>
      <div class="hud-loadout__row">
        <span class="hud-loadout__k">강도</span>
        <span id="hud-damage-lv" class="hud-loadout__v">1/5</span>
      </div>
      <div class="hud-loadout__row">
        <span class="hud-loadout__k">무기</span>
        <span id="hud-weapon" class="hud-loadout__v">스탠다드</span>
      </div>
    </div>
    <div id="overlay" class="hidden">
      <div id="overlay-card">
        <p id="overlay-title"></p>
        <p id="overlay-hint">버튼을 누르거나 스페이스로 다시 시작</p>
        <button type="button" id="btn-restart">다시 하기</button>
      </div>
    </div>
  </div>
    <button
      type="button"
      id="btn-bomb"
      class="btn-bomb"
      aria-label="폭탄 발사, 키보드 B"
    >
      BOMB
    </button>
  </div>
  <script src="js/input.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
